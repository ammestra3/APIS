<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ejercicio 1 — Galería de Imágenes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="pageHeader">
    <a class="backBtn" href="../index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al inicio
    </a>
    <div class="headerContent">
      <div class="exerciseBadge">Ejercicio 01</div>
      <h1>Galería de Imágenes</h1>
      <p>API: <code>https://jsonplaceholder.typicode.com/photos</code></p>
    </div>
  </header>

  <div class="controls">
    <div class="controlsLeft">
      <label for="limitSelect">Mostrar:</label>
      <select id="limitSelect">
        <option value="10">10 fotos</option>
        <option value="20" selected>20 fotos</option>
        <option value="50">50 fotos</option>
      </select>
    </div>
    <button id="loadBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.99"/></svg>
      Cargar galería
    </button>
  </div>

  <div id="loader" class="loader" style="display:none">
    <div class="spinner"></div>
    <span>Cargando fotos desde la API...</span>
  </div>

  <div id="errorMsg" class="errorMsg" style="display:none"></div>

  <div id="gallery" class="gallery"></div>

  <!-- Modal para ver foto ampliada -->
  <div id="photoModal" class="photoModal" style="display:none">
    <div class="modalOverlay" id="modalOverlay"></div>
    <div class="modalBox">
      <button class="modalClose" id="modalClose">✕</button>
      <img id="modalImg" src="" alt=""/>
      <div class="modalInfo">
        <div class="modalMeta" id="modalMeta"></div>
        <div class="modalTitle" id="modalTitle"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
