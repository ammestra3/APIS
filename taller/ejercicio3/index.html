<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ejercicio 3 — Pokédex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="pageHeader">
    <a class="backBtn" href="../index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al inicio
    </a>
    <div class="headerContent">
      <div class="exerciseBadge">Ejercicio 03</div>
      <h1>Pokédex</h1>
      <p>API: <code>https://pokeapi.co/api/v2/pokemon/{nombre}</code> · Sin registro requerido</p>
    </div>
  </header>

  <main class="mainContent">

    <!-- Buscador -->
    <div class="searchBox">
      <input
        type="text"
        id="pokeInput"
        placeholder="Ej: pikachu, charizard, 25..."
        autocomplete="off"
      />
      <button id="searchBtn">
        <span id="searchBtnText">Buscar</span>
        <div id="searchSpinner" class="btnSpinner" style="display:none"></div>
      </button>
    </div>

    <!-- Botones rápidos -->
    <div class="quickBtns">
      <span class="quickLabel">Ejemplos:</span>
      <button class="quickBtn" data-pokemon="pikachu">⚡ Pikachu</button>
      <button class="quickBtn" data-pokemon="charizard">🔥 Charizard</button>
      <button class="quickBtn" data-pokemon="mewtwo">🧬 Mewtwo</button>
      <button class="quickBtn" data-pokemon="bulbasaur">🌿 Bulbasaur</button>
      <button class="quickBtn" data-pokemon="gengar">👻 Gengar</button>
      <button class="quickBtn" data-pokemon="eevee">🦊 Eevee</button>
    </div>

    <!-- Estado de error -->
    <div id="statusMsg" class="statusMsg" style="display:none"></div>

    <!-- Tarjeta del pokémon -->
    <div id="pokeCard" class="pokeCard" style="display:none">

      <div class="pokeCardHeader" id="pokeCardHeader">
        <div class="pokeNum" id="pokeNum"></div>
        <img class="pokeImg" id="pokeImg" src="" alt="pokemon"/>
        <div class="pokeName" id="pokeName"></div>
        <div class="typesRow" id="pokeTypes"></div>
      </div>

      <div class="pokeCardBody">

        <div class="infoGrid">
          <div class="infoBox">
            <div class="infoLabel">Altura</div>
            <div class="infoValue" id="pokeHeight"></div>
          </div>
          <div class="infoBox">
            <div class="infoLabel">Peso</div>
            <div class="infoValue" id="pokeWeight"></div>
          </div>
          <div class="infoBox">
            <div class="infoLabel">XP Base</div>
            <div class="infoValue" id="pokeXp"></div>
          </div>
          <div class="infoBox">
            <div class="infoLabel">Habilidades</div>
            <div class="infoValue" id="pokeAbilCount"></div>
          </div>
        </div>

        <div class="sectionTitle">Estadísticas Base</div>
        <div id="pokeStats" class="statsList"></div>

        <div class="sectionTitle" style="margin-top:1.5rem">Habilidades</div>
        <div id="pokeAbilities" class="abilitiesRow"></div>

        <div class="sectionTitle" style="margin-top:1.5rem">Movimientos (primeros 8)</div>
        <div id="pokeMoves" class="movesRow"></div>

      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
