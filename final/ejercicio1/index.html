<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ejercicio 1 — galería de imágenes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="game-header">
    <h1>galería de imágenes</h1>
    <p>// jsonplaceholder api · fetch · async/await //</p>
  </div>

  <div class="controls">
    <label for="limitSelect">mostrar:</label>
    <select id="limitSelect">
      <option value="10">10 fotos</option>
      <option value="20" selected>20 fotos</option>
      <option value="50">50 fotos</option>
    </select>
    <button id="loadBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.99"/></svg>
      cargar
    </button>
  </div>

  <div id="loader" class="loader" style="display:none">
    <div class="spinner"></div>
    <span>cargando fotos...</span>
  </div>

  <div id="errorMsg" class="errorMsg" style="display:none"></div>
  <div id="gallery" class="gallery"></div>

  <div id="photoModal" class="photoModal" style="display:none">
    <div class="modalOverlay" id="modalOverlay"></div>
    <div class="modalBox">
      <button class="modalClose" id="modalClose">✕</button>
      <img id="modalImg" src="" alt=""/>
      <div class="modalInfo">
        <div class="modalMeta" id="modalMeta"></div>
        <div class="modalTitle" id="modalTitle"></div>
      </div>
    </div>
  </div>

  <a href="../index.html" class="btn-back" title="volver al inicio">&#8592;</a>
  <script src="app.js"></script>
</body>
</html>
