<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ejercicio 3 — pokédex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <nav class="nav">
      <img src="images/logo.png" alt="logo pokédex"/>
      <div class="nav-search">
        <div class="search-wrap">
          <input type="text" id="pokeInput" placeholder="buscar por nombre o número..." autocomplete="off"/>
          <button id="searchBtn">buscar</button>
        </div>
        <button class="btn-ver-todos" id="ver-todos">⊞ ver todos</button>
      </div>
      <ul class="nav-list">
        <li><button class="btn-header normal"   data-tipo="normal">normal</button></li>
        <li><button class="btn-header fire"     data-tipo="fire">fire</button></li>
        <li><button class="btn-header water"    data-tipo="water">water</button></li>
        <li><button class="btn-header grass"    data-tipo="grass">grass</button></li>
        <li><button class="btn-header electric" data-tipo="electric">electric</button></li>
        <li><button class="btn-header ice"      data-tipo="ice">ice</button></li>
        <li><button class="btn-header fighting" data-tipo="fighting">fighting</button></li>
        <li><button class="btn-header poison"   data-tipo="poison">poison</button></li>
        <li><button class="btn-header ground"   data-tipo="ground">ground</button></li>
        <li><button class="btn-header flying"   data-tipo="flying">flying</button></li>
        <li><button class="btn-header psychic"  data-tipo="psychic">psychic</button></li>
        <li><button class="btn-header bug"      data-tipo="bug">bug</button></li>
        <li><button class="btn-header rock"     data-tipo="rock">rock</button></li>
        <li><button class="btn-header ghost"    data-tipo="ghost">ghost</button></li>
        <li><button class="btn-header dark"     data-tipo="dark">dark</button></li>
        <li><button class="btn-header dragon"   data-tipo="dragon">dragon</button></li>
        <li><button class="btn-header steel"    data-tipo="steel">steel</button></li>
        <li><button class="btn-header fairy"    data-tipo="fairy">fairy</button></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- estado vacío inicial -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⚡</div>
      <p class="empty-title">busca tu pokémon</p>
      <p class="empty-sub">escribe el nombre o número, filtra por tipo, o usa "ver todos"</p>
    </div>

    <!-- loader -->
    <div class="loader-wrap" id="loaderWrap" style="display:none">
      <div class="pokeball-loader"></div>
      <span>cargando pokédex...</span>
    </div>

    <!-- error -->
    <div class="error-msg" id="errorMsg" style="display:none"></div>

    <!-- resultado búsqueda individual (tarjeta grande) -->
    <div class="single-result" id="singleResult" style="display:none">
      <div class="poke-card-big" id="pokeCardBig">
        <div class="poke-header" id="pokeHeader">
          <div class="poke-num" id="pokeNum"></div>
          <img class="poke-img" id="pokeImg" src="" alt=""/>
          <div class="poke-name" id="pokeName"></div>
          <div class="poke-tipos" id="pokeTipos"></div>
        </div>
        <div class="poke-body">
          <div class="poke-attrs">
            <div class="attr-box"><span class="attr-label">altura</span><span class="attr-val" id="pokeAltura"></span></div>
            <div class="attr-box"><span class="attr-label">peso</span><span class="attr-val" id="pokePeso"></span></div>
            <div class="attr-box"><span class="attr-label">xp base</span><span class="attr-val" id="pokeXp"></span></div>
            <div class="attr-box"><span class="attr-label">habilidades</span><span class="attr-val" id="pokeAbilCount"></span></div>
          </div>
          <div class="section-title">estadísticas</div>
          <div class="stats-list" id="pokeStats"></div>
          <div class="section-title">habilidades</div>
          <div class="abilities-row" id="pokeAbilities"></div>
          <div class="section-title">movimientos</div>
          <div class="moves-row" id="pokeMoves"></div>
        </div>
      </div>
    </div>

    <!-- grilla de todos / filtro por tipo -->
    <div class="pokemon-todos" id="listaPokemon" style="display:none"></div>
  </main>

  <a href="../index.html" class="btn-back" title="volver al inicio">&#8592;</a>
  <script src="app.js"></script>
</body>
</html>
