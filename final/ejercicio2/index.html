<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ejercicio 2 — app del clima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="game-header">
    <h1>app del clima</h1>
    <p>// openweathermap api · fetch · async/await //</p>
  </div>

  <div class="card">
    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="ingrese la ciudad..." autocomplete="off" spellcheck="false"/>
      <button id="searchBtn">
        <img src="images-clima/images/search.png" alt="buscar"/>
      </button>
    </div>

    <div class="quickCities">
      <button class="cityChip" data-city="Bogotá">🇨🇴 bogotá</button>
      <button class="cityChip" data-city="Medellín">🇨🇴 medellín</button>
      <button class="cityChip" data-city="London">🇬🇧 london</button>
      <button class="cityChip" data-city="Tokyo">🇯🇵 tokyo</button>
      <button class="cityChip" data-city="New York">🇺🇸 new york</button>
    </div>

    <div class="error" id="errorMsg" style="display:none">
      <p id="errorText">nombre de ciudad inválida</p>
    </div>

    <div class="weather" id="weatherBox">
      <img src="images-clima/images/rain.png" alt="" class="weather-icon" id="weatherIcon"/>
      <h1 class="temp" id="temp">--°C</h1>
      <h2 class="city" id="cityName">--</h2>
      <div class="details">
        <div class="col">
          <img src="images-clima/images/humidity.png" alt="humedad"/>
          <div>
            <p class="humidity" id="humidity">--%</p>
            <p>humedad</p>
          </div>
        </div>
        <div class="col">
          <img src="images-clima/images/wind.png" alt="viento"/>
          <div>
            <p class="wind" id="wind">-- km/h</p>
            <p>velocidad del viento</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <a href="../index.html" class="btn-back" title="volver al inicio">&#8592;</a>
  <script src="app.js"></script>
</body>
</html>
