<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header estilo videojuego -->
    <div class="game-header">
        <h1>APP DEL CLIMA</h1>
        <p>// OPENWEATHERMAP API · FETCH · ASYNC/AWAIT //</p>
    </div>

    <div class="card">
        <div class="search-bar">
            <input type="text" placeholder="Ingrese la ciudad" spellcheck="false">
            <button><img src="images-clima/images/search.png" alt=""></button>
        </div>
        <div class="error">
            <p>Nombre de ciudad invalida</p>
        </div>
        <div class="weather">
            <img src="images-clima/images/rain.png" alt="" class="weather-icon">
            <h1 class="temp">23 &deg;C</h1>
            <h2 class="city">Lima</h2>
            <div class="details">
                <div class="col">
                    <img src="images-clima/images/humidity.png" alt="">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humedad</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images-clima/images/wind.png" alt="">
                    <div>
                        <p class="wind">120 km/h</p>
                        <p>Velocidad del viento</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Flecha flotante para volver al inicio -->
    <a href="../index.html" class="btn-back" title="Volver al inicio">&#8592;</a>

    <script src="script.js"></script>
</body>
</html>
